<!DOCTYPE html>
<html>
<body>
    <canvas id="canvas"></canvas>
    <div id="results"></div>
    <script>
        const img = new Image();
        img.src = '../images/cyber/argentinosaurus.png';
        img.onload = () => {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
            const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            let minX = img.width, maxX = 0, minY = img.height, maxY = 0;
            for (let y = 0; y < img.height; y++) {
                for (let x = 0; x < img.width; x++) {
                    const r = data[(y * img.width + x) * 4];
                    const g = data[(y * img.width + x) * 4 + 1];
                    const b = data[(y * img.width + x) * 4 + 2];
                    if (r + g + b > 30) {
                        if (x < minX) minX = x;
                        if (x > maxX) maxX = x;
                        if (y < minY) minY = y;
                        if (y > maxY) maxY = y;
                    }
                }
            }
            const results = {
                width: img.width,
                height: img.height,
                minX, maxX, minY, maxY,
                contentW: maxX - minX + 1,
                contentH: maxY - minY + 1,
                bottomGap: img.height - 1 - maxY
            };
            document.getElementById('results').innerText = JSON.stringify(results, null, 2);
            // Draw box
            ctx.strokeStyle = 'red';
            ctx.lineWidth = 5;
            ctx.strokeRect(minX, minY, results.contentW, results.contentH);
        };
    </script>
</body>
</html>
