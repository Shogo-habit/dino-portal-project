<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dino-Nexus | Digital Dinosaur Museum</title>
    <meta name="description" content="Dino-Nexus: デジタル恐竜図鑑。150種以上の恐竜データを最新の学説に基づき網羅。AI検索に最適化された次世代の生物学的アーカイブ。">
    <link rel="canonical" href="https://dino-nexus.example.com/">
    <link rel="stylesheet" href="style.css?v=5.3.3">
    <!-- Base Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",

</head>
<body class="hud-theme">
    <!-- Overlay effects -->
    <div class="scanlines"></div>
    <div class="grid-overlay"></div>
    <div class="noise-overlay"></div>

    <header class="main-header">
        <div class="logo-container">
            <span class="logo-prefix">プロジェクト</span>
            <h1 class="logo-text">DINO-NEXUS</h1>
            <div class="status-indicator">ディノ・ネクサス</div>
        </div>
        <nav class="nav-menu" aria-label="メインナビゲーション">
            <a href="#home" class="nav-link active" data-link="home" aria-label="ホーム画面へ">
                <span class="nav-icon" aria-hidden="true">▤</span> ホーム
            </a>
            <a href="#dictionary" class="nav-link" data-link="dictionary" aria-label="恐竜図鑑を表示">
                <span class="nav-icon" aria-hidden="true">☷</span> 恐竜図鑑
            </a>
            <a href="#vs-sim" class="nav-link" data-link="vs-sim" aria-label="バトルシミュレーターを起動">

            <a href="#news-feed" class="nav-link" data-link="news-feed" aria-label="最新ニュースを表示">
                <span class="nav-icon" aria-hidden="true">◈</span> 最新ニュース
            </a>
            <a href="#my-collection" class="nav-link" data-link="my-collection" aria-label="自分の観測データを確認">
                <span class="nav-icon" aria-hidden="true">📊</span> マイ図鑑
            </a>
            <a href="#glossary" class="nav-link" data-link="glossary" aria-label="用語集を表示">
                <span class="nav-icon" aria-hidden="true">📔</span> 用語集
            </a>
        </nav>
    </header>

    <main id="app-container">
        <!-- Content will be injected here by app.js -->
        <div class="loader">
            <div class="loader-bar"></div>
            <p>データ・ストリーム初期化中...</p>
        </div>
    </main>

    <footer class="main-footer">
        <div class="ai-disclaimer">
            本アーカイブの視覚データは、最新の古生物学的知見に基づきAIによって生成されたシミュレーション画像です。

        <div class="terminal-footer">
            <div class="footer-left">
                <span class="term-prompt">></span>
                <span class="typing-text">アーカイブ走査中...</span>
            </div>
            <div class="footer-right">
                <span class="coord">LAT: 35.6895 N</span>
                <span class="coord">LON: 139.6917 E</span>
                <span class="version">V.2026.4.5</span>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="data.js?v=5.3.3"></script>
    <script src="cyber_assets.js?v=5.3.3"></script>
    <script src="app.js?v=5.3.3"></script>
